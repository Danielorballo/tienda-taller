name: Radar de tendencias + publicación en redes

on:
  schedule:
    - cron: "30 8 * * *"   # diario 08:30 UTC (10:30 Madrid en verano)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social
  cancel-in-progress: false

jobs:
  radar-y-redes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Radar de tendencias AliExpress
        env:
          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
        run: node scripts/trending.js

      - name: Generar pack de publicaciones (con Chrome headless del runner)
        run: node scripts/make-posts.js

      - name: Fotos IA del día (Pollinations, gratis — si falla, siguen las tarjetas)
        run: node scripts/gen-image.js || true

      - name: Guardar catálogo y pack en el repo
        run: |
          git config user.name "bot-tienda"
          git config user.email "actions@github.com"
          git add data/products.json social/
          git diff --cached --quiet || git commit -m "🤖 Radar diario: tendencias + pack de redes"
          git push

      - name: Publicar en redes (X, Facebook, Instagram)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SOCIAL_IMAGE_BASE: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: node scripts/publish.js
