name: Construir y publicar tienda

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *"   # regeneración diaria 05:00 UTC (07:00 Madrid en verano)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generar sitio
        run: node scripts/build.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
